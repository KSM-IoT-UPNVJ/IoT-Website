name: Deploy Fullstack Docker

on:
  push:
    branches: [ master ] # Sesuaikan dengan branch Anda (main/master)
  pull_request:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

        # 1. Security Check: Pastikan tidak ada library berbahaya
      - name: Security Audit & Cleanup
        run: |
          # Hapus cache npm untuk memastikan installasi bersih
          npm cache clean --force
          # Audit keamanan (proses akan GAGAL jika ada celah keamanan level 'critical')
          npm audit --audit-level=critical

      # 2. Login ke Docker Hub (Agar bisa simpan Image di sana)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build & Push Image Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile # Pastikan file Dockerfile ada di root
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ksmiot-frontend:latest
          platforms: linux/amd64

      # 4. Deploy ke Server via SSH
      - name: SSH Remote Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Login ke Docker Hub di server
            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Tarik image terbaru
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/ksmiot-frontend:latest

            # Stop & Hapus container lama (jika ada)
            sudo docker stop nextjs-ksmiot || true
            sudo docker rm nextjs-ksmiot || true

            # Jalankan container baru
            sudo docker run -d \
              --name nextjs-ksmiot \
              -p 3000:3000 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/ksmiot-frontend:latest

            # Bersihkan image lama yang sudah tidak terpakai (hemat disk)
            sudo docker image prune -a -f