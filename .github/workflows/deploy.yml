name: Deploy Fullstack

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ===== FRONTEND =====
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Build Next.js
        run: |
          npm ci
          npm run build
      
      - name: Prepare Standalone Assets
        run: |
          cp -r public/ .next/standalone/
          cp -r .next/static/ .next/standalone/.next/

      - name: Upload Frontend Standalone
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: ".next/standalone/*"
          target: "/var/www/frontend/app"
          strip_components: 2
          rm: true

      # ===== BACKEND =====
      - name: Upload Backend
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend/*"
          target: "/var/www/backend/api"

      - name: Restart Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

      # ===== RESTART SERVICES =====
      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Restart frontend
            cd /var/www/frontend/app
            pm2 restart iotweb-frontend || pm2 start npm --name "iotweb-frontend" -- server.js

            # Restart backend
            cd /var/www/backend/api
            if [ -d ".venv" ]; then
              source .venv/bin/activate
              pip install -r requirements.txt
            fi
            sudo systemctl restart fastapi

            pm2 save

